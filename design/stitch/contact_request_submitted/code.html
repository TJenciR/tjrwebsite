<style>
        body {
            background-color: theme('colors.app-bg');
            color: theme('colors.text-primary');
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay {
            background-color: rgba(5, 13, 24, 0.85);
            backdrop-filter: blur(8px);
        }
        .form-input {
            @apply w-full bg-surface-container border border-border-subtle rounded text-text-primary px-3 py-2 font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors placeholder-text-muted;
        }
        .form-label {
            @apply block font-label-sm text-label-sm text-text-muted mb-1;
        }
    </style>

<body>
<!-- Context: This is a modal overlay that would typically appear over the Overview page. 
         For this specific task, we are rendering just the modal on a dark background to focus on its design. -->
<div class="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
<!-- Modal Container -->
<div class="bg-surface-elevated border border-border-subtle rounded-xl w-full max-w-md shadow-[0_8px_32px_rgba(0,0,0,0.6)] overflow-hidden flex flex-col relative">
<!-- Header -->
<div class="flex items-center justify-between p-6 border-b border-border-subtle">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-[24px]">lock</span>
<h2 class="font-headline-md text-headline-md text-text-primary">Contact Access</h2>
</div>
<button aria-label="Close modal" class="text-text-muted hover:text-text-primary transition-colors focus:outline-none">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Body -->
<div class="p-10 flex flex-col items-center justify-center text-center">
<span class="material-symbols-outlined text-status-success text-[64px] mb-6">check_circle</span>
<h3 class="font-headline-md text-headline-md text-text-primary mb-3">Request Submitted</h3>
<p class="font-body-md text-body-md text-text-muted leading-relaxed">
    Request received. I will review and respond shortly.
</p>
</div>
<!-- Footer -->
<div class="p-6 border-t border-border-subtle bg-surface-container-low flex justify-end gap-3">
<button class="px-6 py-2 rounded bg-primary text-on-primary font-label-sm text-label-sm font-semibold hover:bg-primary-fixed-dim transition-colors" type="button">
                    CLOSE
                </button>
</div>
</div>
